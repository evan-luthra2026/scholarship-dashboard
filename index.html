 and Company", "useCase": "I would build PharmaSafe Agent \u2014 an AI agent that automates pharmacovigilance (drug safety) case processing for small and mid-size pharmaceutical companies. Every drug on the market generates safety reports called ICSRs (Individual Case Safety Reports) when patients experience adverse reactions. Regulators like the FDA mandate these be processed and submitted within 7-15 days. The problem? Each case requires a trained specialist to manually read unstructured patient narratives, extract structured data, code adverse events using medical terminology (MedDRA), assess causality, write a regulatory narrative, and submit in compliant format. This takes 30-45 minutes per case. Large pharma companies have massive teams for this. Small and mid-size companies don't \u2014 they outsource to CROs at $80-200 per case, with costs that spike unpredictably during product launches. PharmaSafe Agent would handle this end-to-end: Monitor incoming reports from email, call centers, and literature feeds Validate each report against the four minimum ICSR criteria and triage by seriousness Extract patient demographics, medical history, suspect drug details, and adverse event data from unstructured text using fine-tuned LLMs Code adverse events to MedDRA terms and perform preliminary causality assessment Draft a regulatory-quality case narrative following ICH E2B(R3) conventions Track every case against its regulatory deadline and escalate overdue cases Package approved cases into submission-ready E2B(R3) XML for FDA/EMA The agent follows an \"AI prepares, human approves\" model \u2014 it never submits without a pharmacovigilance specialist's sign-off. This shifts the specialist's role from data entry to clinical judgment, making one person as productive as five. Target impact: processing time from 30-45 min to 5-8 min per case, cost reduction of 70-80%, and 99%+ deadline compliance.", "whySelected": "I'm not pitching a hypothetical \u2014 I'm already building this at Eli Lilly and Company. As an AI/ML engineer at Lilly, my primary project (AEPC) classifies pharmaceutical chatbot conversations for Mounjaro and Zepbound for regulatory safety reporting. I built the full production pipeline: data standardization, LLM fine-tuning based adverse event classification, and a validated questionnaire-based approach where AI populates clinically validated forms rather than making direct safety determinations. This design distributes AI error risk across multiple validated checkpoints \u2014 a strategy born from navigating real FDA regulatory constraints, not academic theory. I've documented the entire architecture across 13,700+ lines of technical documentation covering pipeline design, validation checks, edge cases, and deployment paths for fine-tuned LLMs on Azure infrastructure. What makes me different from other applicants: Domain depth: I understand MedDRA coding, ICH E2B(R3) submissions, causality assessment, and ICSR timelines \u2014 not just the ML techniques. This is what makes the agent actually deployable vs. a hackathon prototype. Production experience: I've shipped pharmacovigilance AI at one of the world's top 10 pharma companies. I know what breaks in production, what regulators scrutinize, and what auditors look for. Strategic design thinking: My \"AI populates validated forms\" approach was engineered to satisfy regulatory accountability requirements. In pharma, how you frame AI's role matters as much as what it does. Personal motivation: Every ICSR processed on time is a safety signal reaching regulators faster. I've seen the backlog from inside big pharma \u2014 I want to solve it for the companies that need it most but can afford it least. This scholarship would let me extend battle-tested work to the broader pharma ecosystem.", "social": "https://www.linkedin.com/in/ankit-jain-07036b71?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=android_app", "date": "2026-03-22 03:06+00:00", "social let apps = RAW_DATA.map(a => ({...a, status: 'pending'}));
let decisions = JSON.parse(localStorage.getItem('scholarship_decisions_v2') || '{}');
apps.forEach(a => { if (decisions[a.id]) a.status = decisions[a.id]; });

function save() {
    const d = {};
    apps.forEach(a => { if (a.status !== 'pending') d[a.id] = a.status; });
    localStorage.setItem('scholarship_decisions_v2', JSON.stringify(d));
}

function init() {
    const countries = [...new Set(apps.map(a => a.country).filter(Boolean))].sort();
    const roles = [...new Set(apps.map(a => a.role).filter(Boolean))].sort();
    const cs = document.getElementById('countryFilter');
    const rs = document.getElementById('roleFilter');
    countries.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; cs.appendChild(o); });
    roles.forEach(r => { const o = document.createElement('option'); o.value = r; o.textContent = r; rs.appendChild(o); });
    render();
}

function getFiltered() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const country = document.getElementById('countryFilter').value;
    const role = document.getElementById('roleFilter').value;
    const status = document.getElementById('statusFilter').value;
    const sort = document.getElementById('sortBy').value;

    let filtered = apps.filter(a => {
        if (q && !a.name.toLowerCase().includes(q) && !a.email.toLowerCase().includes(q) && !a.useCase.toLowerCase().includes(q)) return false;
        if (country && a.country !== country) return false;
        if (role && a.role !== role) return false;
        if (status && a.status !== status) return false;
        return true;
    });

    filtered.sort((a, b) => {
        if (sort === 'date') return new Date(b.date) - new Date(a.date);
        if (sort === 'date-old') return new Date(a.date) - new Date(b.date);
        if (sort === 'name') return a.name.localeCompare(b.name);
        if (sort === 'country') return (a.country||'').localeCompare(b.country||'');
        return 0;
    });
    return filtered;
}

function render() {
    const filtered = getFiltered();
    const grid = document.getElementById('grid');
    
    const selected = apps.filter(a => a.status === 'selected').length;
    const rejected = apps.filter(a => a.status === 'rejected').length;
    document.getElementById('totalCount').textContent = apps.length;
    document.getElementById('selectedCount').textContent = selected;
    document.getElementById('rejectedCount').textContent = rejected;
    document.getElementById('pendingCount').textContent = apps.length - selected - rejected;

    if (!filtered.length) { grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#666;">No applications match filters.</div>'; return; }

    grid.innerHTML = filtered.map(a => {
        const d = new Date(a.date);
        const dateStr = d.toLocaleDateString('en-AU', {day:'numeric',month:'short',year:'numeric'});
        const socialHtml = a.socialLink ? `<div class="social-link">🔗 <a href="${esc(a.socialLink)}" target="_blank" rel="noopener">${a.socialLink.includes('linkedin') ? 'LinkedIn' : a.socialLink.includes('twitter') || a.socialLink.includes('x.com') ? 'Twitter/X' : a.socialLink.includes('instagram') ? 'Instagram' : 'Profile'}</a></div>` : '';
        
        let actionHtml;
        if (a.status === 'pending') {
            actionHtml = `<button class="btn btn-select" onclick="decide('${a.id}','selected')">✅ Select</button><button class="btn btn-reject" onclick="decide('${a.id}','rejected')">❌ Reject</button>`;
        } else {
            actionHtml = `<button class="btn btn-undo" onclick="decide('${a.id}','pending')">↩ Undo</button>`;
        }

        return `<div class="card ${a.status}">
            <div class="card-top"><div class="name">${esc(a.name)}</div><span class="badge badge-${a.status}">${a.status}</span></div>
            <div class="meta">📧 ${esc(a.email)}<br>🌍 ${esc(a.country||'N/A')} · 👤 ${esc(a.role||'N/A')} · 📅 ${dateStr}</div>
            <div class="section-title">💡 Use Case</div>
            <div class="section-text">${esc(a.useCase||'Not provided')}</div>
            <div class="section-title">⭐ Why Selected</div>
            <div class="section-text">${esc(a.whySelected||'Not provided')}</div>
            ${socialHtml}
            <div class="actions">${actionHtml}</div>
        </div>`;
    }).join('');
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function decide(id, status) {
    const a = apps.find(x => x.id === id);
    if (a) { a.status = status; save(); render(); }
}

function exportCSV() { dlCSV(apps, 'scholarship_all.csv'); }
function exportSelected() { dlCSV(apps.filter(a => a.status === 'selected'), 'scholarship_selected.csv'); }

function dlCSV(data, filename) {
    const headers = ['Name','Email','Country','Role','Use Case','Why Selected','Social','Date','Status'];
    const rows = data.map(a => [a.name, a.email, a.country, a.role, a.useCase, a.whySelected, a.socialLink, a.date, a.status].map(v => '"' + (v||'').replace(/"/g,'""') + '"'));
    const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
    const blob = new Blob([csv], {type: 'text/csv'});
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url; link.download = filename; link.click();
    URL.revokeObjectURL(url);
}

['searchInput','countryFilter','roleFilter','statusFilter','sortBy'].forEach(id => {
    document.getElementById(id).addEventListener(id === 'searchInput' ? 'input' : 'change', render);
});

init();
</script>
